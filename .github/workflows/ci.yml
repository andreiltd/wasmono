name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Install dotslash
        uses: taiki-e/install-action@6ed6112eb9893c58dd600eebccdf6e77ab7bfa9c # v2
        with:
          tool: dotslash

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32-wasip1,wasm32-wasip2

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10

      - name: Configure sccache
        shell: bash
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
          echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"

      - name: Run tests (Linux/macOS)
        if: runner.os != 'Windows'
        run: ./buck2 test //examples/...

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        run: dotslash buck2 test //examples/...

      - name: Build JavaScript component example (Linux/macOS)
        if: runner.os != 'Windows'
        run: ./buck2 build //examples/validator/regex_js:regex_component

      - name: Build JavaScript component example (Windows)
        if: runner.os == 'Windows'
        run: dotslash buck2 build //examples/validator/regex_js:regex_component

      - name: Test external cell compatibility (Linux/macOS)
        if: runner.os != 'Windows'
        run: python3 tests/test_external_cell.py

      - name: Test external cell compatibility (Windows)
        if: runner.os == 'Windows'
        run: python tests/test_external_cell.py
