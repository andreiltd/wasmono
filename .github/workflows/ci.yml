name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dotslash
        uses: taiki-e/install-action@v2
        with:
          tool: dotslash

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1,wasm32-wasip2

      - name: Run tests
        run: ./buck2 test //examples/...

      - name: Test external cell compatibility
        run: python3 tests/test_external_cell.py
