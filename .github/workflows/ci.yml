name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    environment: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') && 'buildbuddy' || '' }}
    env:
      BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Install dotslash
        uses: facebook/install-dotslash@1e4e7b3e07eaca387acb98f1d4720e0bee8dbb6a # v2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32-wasip1,wasm32-wasip2

      - name: Enable remote cache
        if: ${{ env.BUILDBUDDY_API_KEY != '' }}
        shell: bash
        run: |
          rustc_id=$(rustc --version | tr 'A-Z' 'a-z' | tr -c 'a-z0-9' '-')
          cp .github/buildbuddy.buckconfig .buckconfig.local
          echo "instance_name = wasmono-${{ matrix.os }}-${rustc_id}" >> .buckconfig.local

      - name: Force cache uploads from main
        if: ${{ env.BUILDBUDDY_API_KEY != '' && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        shell: bash
        run: echo "BUCK2_TEST_FORCE_CACHE_UPLOAD=1" >> "$GITHUB_ENV"

      - name: Run tests (Linux/macOS)
        if: runner.os != 'Windows'
        run: ./buck2 test //examples/...

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        run: dotslash buck2 test //examples/...

      - name: Build JavaScript component example (Linux/macOS)
        if: runner.os != 'Windows'
        run: ./buck2 build //examples/validator/regex_js:regex_component

      - name: Build JavaScript component example (Windows)
        if: runner.os == 'Windows'
        run: dotslash buck2 build //examples/validator/regex_js:regex_component

      - name: Test external cell compatibility (Linux/macOS)
        if: runner.os != 'Windows'
        run: python3 tests/test_external_cell.py

      - name: Test external cell compatibility (Windows)
        if: runner.os == 'Windows'
        run: python tests/test_external_cell.py
