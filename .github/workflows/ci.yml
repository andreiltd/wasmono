name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dotslash
        uses: taiki-e/install-action@v2
        with:
          tool: dotslash

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1,wasm32-wasip2

      - name: Run tests (Linux)
        if: runner.os == 'Linux'
        run: ./buck2 test //examples/...

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        run: dotslash buck2 test //examples/...

      - name: Test external cell compatibility (Linux)
        if: runner.os == 'Linux'
        run: python3 tests/test_external_cell.py

      - name: Test external cell compatibility (Windows)
        if: runner.os == 'Windows'
        run: python tests/test_external_cell.py
