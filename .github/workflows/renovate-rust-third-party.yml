name: Update Rust third-party generation

on:
  pull_request:
    branches: [main]
    paths:
      - 'third-party/Cargo.toml'
      - 'third-party/Cargo.lock'
      - 'third-party/BUCK'

jobs:
  update-reindeer-output:
    # Only run on Renovate PRs
    if: startsWith(github.head_ref, 'renovate/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: renovate-autofix-${{ github.head_ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dotslash
        uses: taiki-e/install-action@6ed6112eb9893c58dd600eebccdf6e77ab7bfa9c # v2
        with:
          tool: dotslash

      - name: Update branch
        run: git pull --rebase

      - name: Regenerate third-party BUCK file
        run: ./reindeer buckify

      - name: Validate generated targets
        run: './buck2 targets //third-party:'

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add third-party/BUCK
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: regenerate Rust third-party BUCK

          Co-authored-by: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
            git push
          fi
