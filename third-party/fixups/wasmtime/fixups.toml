cargo_env = ["CARGO_PKG_VERSION", "CARGO_PKG_VERSION_MAJOR", "CARGO_PKG_VERSION_MINOR", "CARGO_PKG_VERSION_PATCH"]

# The build script compiles helpers.c using cc::Build with versioned symbols.
# It auto-detects the OS and sets CFG_TARGET_OS_windows/FEATURE_DEBUG_BUILTINS.
[buildscript.run]
env = { OPT_LEVEL = "3" }
rustc_link_search = true
rustc_link_lib = true
